ipc_setting:
  cpu_overload_threshold : 80                 # CPU overload threshold in percent  
  cpu_overload_time_second : 20               # CPU overload threshold time in seconds
  cpu_temper_warning_c : 60                   # CPU temperature warning threshold in Celsius
  mem_overload_percent : 80                   # Memory overload threshold in percent
  mem_overload_time_second : 20               # Memory overload threshold time in seconds
  disk_avaliable_gbytes : 10                  # Disk available threshold in GB
  disk_usage_percent : 90                     # Disk usage threshold in percent
  disk_usage_time_second : 20                 # Disk usage threshold time in seconds

navigation:                                   # 네비게이션 파라미터
  b_release_mode : true                       # true: 로그 및 시각화 끄는 모드, false: 로그 및 시각화 켜는 모드 
  b_live_topology_mode : false                # true: 실시간 경로 받는 모드(맵에 노드링크 불필요), false: normal mode
  f_goal_receive_time_gap_sec : 0.3           # 이동 명링시 최소 수신 시간 간격 
  n_icp_error_ratio_threshold : 10            # ☆ 위치추정 매칭 에러 발생 비율(confidence) 임계값 
  n_icp_error_count_threshold : 3             # ☆ 위치추정 매칭 에러 발생 카운트 임계값 
  f_current_node_change_before_m : 0.0        # 현재 노드 변경 거리

motion_base:                                  # 모션 관련 기본 파라미터
  n_kinematics_type : 2                       # 0: DD, 1: QD, 2: SD, 3: OD
  f_linear_max_accel_mss : 0.3                # 최대 선형 가속도
  f_linear_max_decel_mss : 1.0                # 최대 선형 감속도
  f_rot_max_accdecel_degss : 50               # 최대 회전 가속도/감속도
  f_move_deleay_time_sec : 0.05               # 출발시 딜레이 시간
  f_linear_speed_max_ms : 1.7                 # 최대 선형 속도
  f_linear_speed_min_ms : 0.03                # 최소 선형 속도
  f_angular_speed_max_degs : 30               # 최대 회전 속도
  f_angular_speed_min_degs : 5                # 최소 회전 속도
  f_motion_control_period: 0.06               # 모션 계산/제어 주기 (초)
  f_vel_percent_enable_standard_ms : 0.3      # 속도 퍼센트 제어 활성화 기준 속도
  b_start_control_dist_flag : true            # true: 시작 거리 제어 활성화, false: 비활성화

motion_align:                                 # 제자리 회전 관련 모션 파라미터
  f_align_motion_range_accel_deg : 5.0       # 제자리 회전 가속하는 각도 : 작을수록 가속이 빨라짐
  f_align_motion_range_decel_deg : 20.0       # 제자리 회전 감속하는 각도 : 작을수록 감속이 빨라짐
  f_align_motion_max_rot_degs : 20.0          # 제자리 회전 최대 각속도   : 높을수록 전체 회전속도가 빠름
  f_align_motion_min_rot_degs : 3.0          # 제자리 회전 최소 각속도   : 높을수록 출발 회전속도가 빠름
  f_align_motion_min_rot_end_degs : 2.0       # 제자리 회전 최소 각속도 (종료시)
  f_align_motion_min_rot_deg_range : 2.0      # 제자리 회전 최소 각속도 범위(종료시)
  f_align_motion_threshold_for_start_deg : 5.0      # 제자리 회전 판단 시작 각도
  f_align_motion_threshold_for_end_normal_deg : 1.0 # 제자리 회전 도착 조건 일반 각도
  f_align_motion_threshold_for_end_fine_deg : 0.5   # 제자리 회전 도착 조건 정밀 각도
  f_align_p_gain : 1.0                        # 제자리 회전 P 게인
  f_align_d_gain : 0                          # 제자리 회전 D 게인
  f_align_i_gain : 0.01                       # 제자리 회전 I 게인
  f_align_pid_control_deg : 3                 # 제자리 회전 PID 제어 각도

motion_arrive:                                # 도착 관련 모션 파라미터   
  f_goal_arrive_min_vel_dist_m : 0.12         # 도착전 최저 속도 이동거리
  f_goal_arrive_min_vel_default_dist_m : 0.015 # 도착전 최저 속도 기본 이동거리
  f_goal_arrive_min_vel_dist_degs_ratio : 0.1 # 도착전 최저 속도 이동거리 각도 비율
  f_goal_arrive_min_vel_dist_diagonal_ratio : 0.3 # 도착전 최저 속도 이동거리 사행 비율
  f_goal_arrive_decel_m_ss : 0.2              # 도착전 감속도
  f_near_goal_dist_thres: 0.5                 # 도착 모드 진입하는 잔여 거리 기준
  f_near_goal_speed_thres: 0.2                # 도착 모드 진입하는 속도 기준
  f_arrived_boundary_dist_x_m : 0.035         # 도착 직전 도착처리하는 거리 기준
  f_goal_decel_mss: 0.2                       # 회피시 도착 감속도
  f_motion_arrive_p_gain: 0.0                 # 도착시 속도제어 P 게인
  f_motion_arrive_d_gain: 0.0                 # 도착시 속도제어 D 게인

motion_safe:                                  # 안전 관련 모션 파라미터
  f_safe_far_from_path_to_robot_distance : 0.5  # 경로에서 로봇이 벗어나면 정지하는 기준
  f_control_velocity_far_from_path_m : 0.2    # 경로에서 벗어나서 감속제어가 들어가는 기준
  f_safety_dist_from_obs_m: 1.5               # 장애물 회피 관련 정지 거리

motion_track:                                 # 모션 경로 추종관련 파라미터
  f_motion_steps : 20.0                       # 모션 계산 step : 높일수록 연산량이 늘어나고 예측이 늘어남
  f_motion_ref_cte : 0.0                      # 모션 레터럴 오프셋
  f_motion_vel : 1.0                          # 모션 기본목표 속도, 경로속도를 쓰기 때문에 의미 없음
  f_motion_ref_etheta : 0.0                   # 모션 각도 오프셋
  f_motion_w_cte : 35.0                       # ☆ 모션 경로 추종 웨이트 : 높을수록 경로로 빠르게 수렴, 너무 높으면 휘청임
  f_motion_w_etheta : 1.0                     # ☆ 모션 헤딩 추종 웨이트 : 높을수록 빠르게 회전
  f_motion_w_vel : 8.5                        # 모션 속도 추종 웨이트
  f_motion_w_angvel : 2.0                     # ☆ 모션 각속도 추종 웨이트1 : 높을수록 천천히 회전
  f_motion_w_angvel_d : 1.0                   # 모션 각속도 추종 웨이트2
  f_motion_w_accel : 0.01                      # ☆ 모션 가속도 추종 웨이트1 : 낮을수록 가속을 빠르게 함
  f_motion_w_accel_d : 0.01                    # ☆ 모션 가속도 추종 웨이트2 : 낮을수록 가속을 빠르게 함
  f_motion_max_angvel : 3.0                   # 모션 최대 각속도
  f_motion_throttle : 2.0                     # ☆ 모션 가속도 추종 웨이트3 : 높을수록 가속 빠름
  f_motion_bound_value : 1000.0               # 변수 최대 값 범위
  f_motion_front_path_idx : 100.0             # 레퍼런스 경로 생성시 로봇기준 앞쪽 경로 길이(cm)
  f_motion_back_path_idx : 0.0                # 레퍼런스 경로 생성시 로봇기준 뒤쪽 경로 길이(cm)
  f_motion_curve_front_path_idx : 60.0        # 곡선 레퍼런스 경로 생성시 로봇기준 앞쪽 경로 길이(cm)
  f_motion_curve_back_path_idx : 20.0         # 곡선 레퍼런스 경로 생성시 로봇기준 뒤쪽 경로 길이(cm)
  f_motion_start_dist : 0.0                  # ☆ 출발시 저속 이동 거리(m)
  f_motion_start_speed : 0.15                 # 출발시 저속 이동 목표 속도(m/s)
  f_motion_start_min_speed : 0.05             # 출발시 저속 이동 최소 속도(m/s)
  f_motion_start_duration : 3.0               # 출발시 저속 최소에서 목표 속도까지 걸리는 시간(초)
  f_motion_low_speed_std : 0.2                # 저속 주행 파라미터 변경기준 속도(m/s)
  f_motion_low_speed_w_cte : 50.0             # ☆ 저속 주행시 경로 추종 웨이트 : 높을수록 경로로 빠르게 수렴, 너무 높으면 휘청임
  f_motion_low_speed_w_etheta : 1.0           # ☆ 저속 주행시 헤딩 추종 웨이트 : 높을수록 빠르게 회전
  f_motion_low_speed_w_angvel : 5.0           # ☆ 저속 주행시 각속도 추종 웨이트 : 높을수록 천천히 회전
  f_motion_curve_w_angvel: 1                  # ☆ 곡선 주행시 각속도 추종 웨이트 : 높을수록 천천히 회전
  f_motion_curve_w_angvel_d : 10.0            # 곡선 주행시 각속도 추종 웨이트2
  f_motion_curve_w_accel : 1                  # ☆ 곡선 주행시 가속도 추종 웨이트 : 낮을수록 가속을 빠르게 함
  f_motion_curve_w_accel_d : 10.0             # 곡선 주행시 가속도 추종 웨이트2
  f_motion_curve_throttle : 1                 # 곡선 주행시 가속도 추종 웨이트3
  f_motion_high_speed_std : 0.8               # ☆ 고속 주행 파라미터 변경기준 속도(m/s)
  f_motion_high_speed_w_angvel : 20.0         # ☆ 고속 주행시 각속도 추종 웨이트 : 높을수록 천천히 회전
  f_motion_high_w_accel : 0.01                # 고속 주행시 가속도 추종 웨이트1 : 낮을수록 가속을 빠르게 함
  f_motion_high_w_accel_d : 0.01              # 고속 주행시 가속도 추종 웨이트2
  f_motion_high_throttle : 20                 # 고속 주행시 가속도 추종 웨이트3
  f_motion_high_curve_speed_std : 1.2         # 고속 곡선 주행 파라미터 변경기준 속도(m/s)
  f_motion_high_curve_speed_w_angvel : 5.0    # 고속 곡선 주행시 각속도 추종 웨이트 : 높을수록 천천히 회전
  n_hacs_curve_speed_up_dist_cm : 120         # 곡선에서 서서히 가속하는 거리(cm)

motion_diagonal:                              # 사행 관련 모션 파라미터   
  b_diagonal_control : true                   # true: 사행 제어 활성화, false: 비활성화
  b_use_avoid_align: false                    # 회피시 정렬 모드 사용 여부 (QD, OD만 사용 가능)
  f_diagonal_linear_lateral_w : 0.3           # ☆ QD타입 선형 횡방향 웨이트 : 높을수록 경로로 빠르게 수렴, 너무 높으면 휘청임
  f_diagonal_low_speed : 0.21                 # 사행 저속 주행 파라미터 변경기준 속도(m/s)
  f_diagonal_low_speed_w : 15.0               # ☆ 사행 저속 주행시 경로 추종 웨이트 : 높을수록 경로로 빠르게 수렴, 너무 높으면 휘청임
  f_diagonal_high_speed_w : 4.0               # 사행 고속 주행시 경로 추종 웨이트 : 높을수록 경로로 빠르게 수렴, 너무 높으면 휘청임
  f_diagonal_angle_kp : 1.2                   # 사행 각도 제어 P 게인
  f_diagonal_angle_kd : 0.1                   # 사행 각도 제어 D 게인
  f_diagonal_angle_ki : 0                     # 사행 각도 제어 I 게인
  f_diagonal_curve_speed_ratio : 1.0          # 사행 곡선 주행시 속도 비율 : 1.0이면 곡선 주행시 속도 동일, 0.5이면 절반속도, 2.0이면 두배속도

motion_avoid:                                 # 회피 관련 모션 파라미터  
  f_avoid_vel_ms: 0.8                         # 회피시 목표 속도
  f_avoid_check_vel_ms : 0.2                  # 회피시 장애물 감지 속도
  f_avoid_margin_m : 0.1                      # 회피시 장애물 감지 마진 거리
  f_avoid_detect_obs_dir_margin_m : 1.0       # 회피시 장애물 감지 방향 마진 거리
  f_static_obs_check_time_sec : 1.0           # 정적 장애물 감지 시간
  f_static_obs_check_dist_m : 0.2             # 정적 장애물 감지 거리
  b_avoidance_auto_comeback_path : false       # 회피시 자동 복귀 경로 생성 여부

planner_base:                                 # 경로 계획 관련 기본 파라미터
  n_path_planner_period_ms: 100               # 경로 계획 주기
  b_avoid_permission: true                    # 회피 허용 여부
  f_min_dist_for_forward_path_m: 5.0          # 경로 계획시 최소 전진 거리, 최소 검사 거리
  f_goal_arrive_turning_radius_m : 2          # 도착시 회전 반경
  f_goal_arrive_path_step_size_m : 0.01       # 도착시 경로 계획 step 크기
  f_goal_arrive_straight_line_ratio : 0.4     # 도착시 직선 경로 비율
  n_goal_arrive_start_align_index : 150       # 도착시 시작 정렬 인덱스
  f_angle_dividing_the_path_deg : 10.0        # 경로 분할 각도
  b_allways_align_flag : false                # true: 항상 정렬 모드, false: 경로 계획시 정렬 모드
  f_start_thr_dist_m: 0.5                     # 경로 계획시 시작 거리

planner_local:                                # 로컬 경로 계획 관련 파라미터
  updated_frequency_ms : 80                   # 로컬 경로 계획 업데이트 주기
  map_size_x_m : 14.0                         # 로컬 맵 크기 X  
  map_size_y_m : 14.0                         # 로컬 맵 크기 Y
  map_res_m : 0.1                             # 로컬 맵 해상도
  padding_size_m : 0.2                        # 로컬 맵 패딩 크기

planner_avoid:                                # 회피 경로 계획 관련 파라미터
  n_detection_period_ms: 700                  # 회피 경로 계획 장애물 감지 주기
  n_avoidance_period_ms: 1000                 # 회피 경로 계획 주기  
  f_force_comeback_start_dist_m: 2.0          # 회피시 복귀 시작 거리
  f_force_comeback_target_dist_m: 1.0         # 회피시 복귀 목표 거리
  f_force_comeback_in_curve_added_start_dist_m: 4.0        # 회피시 곡선에서 복귀 시작 거리
  f_polynominal_max_curvature_m : 2.0         # 회피 경로 계획 최대 곡률
  f_avoid_imposible_sec_s : 10.0              # 회피 불가능 판단 시간
  f_dubins_normal_max_curve_radius_m: 6.0     # Dubins 경로 계획 일반 최대 곡률 반경
  f_dubins_normal_min_curve_radius_m: 2.0     # Dubins 경로 계획 일반 최소 곡률 반경
  f_dubins_normal_curve_interval_m: 0.5       # Dubins 경로 계획 일반 곡률 간격
  f_dubins_force_max_curve_radius_m: 7.0      # Dubins 경로 계획 강제 최대 곡률 반경
  f_dubins_force_min_curve_radius_m: 1.0      # Dubins 경로 계획 강제 최소 곡률 반경
  f_dubins_force_curve_interval_m: 0.5        # Dubins 경로 계획 강제 곡률 간격
  f_search_step_size_m: 0.5                   # 회피 경로 계획 검색 step 크기
  n_search_min_step: 4                        # 회피 경로 계획 최소 step
  n_search_max_step: 14                       # 회피 경로 계획 최대 step
  f_interval_m: 0.2                           # 회피 경로 계획 간격
  n_left_num: 15                              # 회피 경로 계획 왼쪽 경로 개수
  n_right_num: 15                             # 회피 경로 계획 오른쪽 경로 개수

obstacle:                                     # 장애물 관련 파라미터  
  b_cluster_use : true                       # ☆ true: 클러스터링 사용, false: 클러스터링 사용 안함  
  data_cluster_distance_m:                    # 클러스터링 거리
  - 0.015
  - 0.020
  - 0.025
  data_cluster_size_min:                      # 클러스터링 최소 크기
  - 10
  - 10
  - 10
  n_cluster_size_max: 10000                   # 클러스터링 최대 크기
  f_cluster_obs_check_dist: 0.03              # 클러스터링 장애물 감지 거리
  f_cluster_step_dist: 1                      # 클러스터링 step 거리
  b_use_detection_mode_flag : true            # ☆ 장애물 감지 모드 사용 여부
  b_use_predict_mode_flag : true              # 장애물 예측 모드 사용 여부
  b_use_start_obs_check_flag : false          # ☆ 시작 장애물 감지 모드 사용 여부
  b_use_side_check_flag : false               # ☆ 측면 장애물 감지 모드 사용 여부
  b_use_obs_alarm_separate : false            # 장애물 알람 분리 사용 여부
  f_start_obs_check_m : 2                     # 시작 장애물 감지 거리
  f_start_obs_step_m : 0.2                    # 시작 장애물 감지 step 크기
  f_move_obstacle_dist_max : 10               # 이동 장애물 최대 거리
