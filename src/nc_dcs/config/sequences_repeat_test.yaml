# Docking Control System Sequences Configuration
# Each sequence is identified by drive_type from ForkLift message
# Actions are categorized by action_type with specific parameters

sequences:
  # Drive Type -1: Unloading (적재 해제) 설비 기준
  unloading:
    drive_type: 1
    name: "LOADING"
    description: "Pallet unloading sequence"
    steps:
      - action_type: "move"
        params:
          type: "align"
        wait_for: "completed"
        
      - action_type: "fork_updown"
        params:
          use_rack_heights: true
          operation: "approach"    # Uses approach_height
          fork_obs_check : true
        wait_for: "completed"

      - action_type : "perception"
        params:
          command: "start"
          target_type: "pallet"
          enabled: true
        wait_for: "completed"
        
      - action_type: "move"
        params:
          type: "docking"
          use_perception_pose: true
          continuous_publish: true
          use_sitting_sensor: true
        wait_for: "completed"

      - action_type: "fork_updown"
        params:
          use_rack_heights: true
          operation: "approach"    # Uses approach_height
          fork_obs_check : true
        delay_sec: 5

      - action_type: "fork_side"
        params:
          position: "wide"  # wide, narrow
        wait_for: "completed"

      - action_type: "fork_updown"
        params:
          use_rack_heights: true
          operation: "pickup"    # Uses approach_height
          fork_obs_check : true
        wait_for: "completed"

      - action_type: "fork_tilt"
        params:
          direction: "up"  # up, down
        wait_for: "completed"

      - action_type: "move"
        params:
          type: "goback"
        wait_for: "completed"

      - action_type: "move"
        params:
          type: "forward"  # wide, narrow
          start_pos: "8.0, 4.683, 0.0"
          end_pos: "8.0, -6.0, 0.0"
        wait_for: "completed"

      - action_type: "move"
        params:
          type: "backward"  # wide, narrow
          start_pos: "8.0, -6.0, 0.0"
          end_pos: "4.570, -6.0, 0.0"
        wait_for: "completed"

      - action_type: "move"
        params:
          type: "forward"  # wide, narrow
          start_pos: "4.570, -6.0, 0.0"
          end_pos: "8.0, -6.0, 0.0"
        wait_for: "completed"

      - action_type: "move"
        params:
          type: "backward"  # wide, narrow
          start_pos: "8.0, -6.0, 0.0"
          end_pos: "8.0, 4.683, 0.0"
        wait_for: "completed"

      # Step 3: Approach to target
      - action_type: "move"
        params:
          type: "backward"
          start_pos: "8.0, 4.683, 0.0"
          end_pos: "4.570, 4.683, 0.0"  
        wait_for: "completed"


      - action_type: "fork_tilt"
        params:
          direction: "down"  # up, down
        wait_for: "completed"

      # Step 6: Lift to pickup height
      - action_type: "fork_updown"
        params:
          use_rack_heights: true
          operation: "approach"    # Uses approach_height
        wait_for: "completed"

      - action_type: "fork_side"
        params:
          position: "narrow"  # wide, narrow
        wait_for: "completed"

      # Step 8: Go back
      - action_type: "move"
        params:
          type: "forward"
          start_pos: "4.570, 4.683, 0.0"
          end_pos: "8.0, 4.683, 0.0"
        wait_for: "completed"

     
  #2층 일단 슬램
  loading:
    drive_type: 2
    name: "LOADING"
    description: "Pallet loading sequence"
    steps:
      # Step 1: Lift to approach height
      - action_type: "fork_updown"
        params:
          use_rack_heights: true
          operation: "approach"    # Uses approach_height
        wait_for: "completed"
        
      # Step 3: Approach to target
      - action_type: "move"
        params:
          type: "backward"
          use_sitting_sensor: true
        wait_for: "completed"

      # Step 6: Lift to pickup height
      - action_type: "fork_updown"
        params:
          use_rack_heights: true
          operation: "pickup"    # Uses approach_height
        wait_for: "completed"

      - action_type: "fork_tilt"
        params:
          direction: "up"  # up, down
        wait_for: "completed"

      - action_type: "fork_side"
        params:
          position: "wide"  # wide, narrow
        delay_sec: 0.5

      # Step 8: Go back
      - action_type: "move"
        params:
          type: "forward"
        wait_for: "completed"

      # Step 9: Lift to carry height
      - action_type: "fork_updown"
        params:
          use_rack_heights: true
          operation: "carry"    # Uses approach_height
        wait_for: "completed"



# Action Type Reference:
# 
# 1. fork_updown - Fork lift up/down control
#    params:
#      - use_rack_heights: bool (optional, use n_target_height from message)
#      - operation: "approach" | "pickup" | "carry" | "place" | "clearance"
#
# 2. fork_side - Fork sideshift control
#    params:
#      - position: "wide" | "narrow"
#
# 3. fork_tilt - Fork tilt control
#    params:
#      - direction: "up" | "down"
#
# 4. move - Robot movement control
#    params:
#      - type: "forward" | "backward" | "rotate" | "docking" | "goback"
#      - distance: float (optional, meters)
#      - angle: float (optional, degrees for rotate)
#      - use_perception_pose: bool (for docking)
#      - continuous_publish: bool (for docking)
#
# 5. perception - Perception/Vision command
#    params:
#      - command: string (command to send)
#      - target_type: "pallet" | "aruco" | "custom" | "wingbody"
#      - enabled: bool (optional, default true)
#
# wait_for: "completed" - Wait until action completes
# delay_sec: float - Fixed delay in seconds
# parallel_actions: list - Actions to execute simultaneously
