  f_linear_speed_min_ms : 0.02 # robot actual linear min speed
  f_angular_speed_max_degs : 60 # robot actual angular max speed
  f_angular_speed_min_degs : 5 # robot actual angular max speed
  f_motion_control_period: 0.08 # kinematic prediction dt
  f_vel_percent_enable_standard_ms : 0.3
  b_start_control_dist_flag : true

motion_align:
