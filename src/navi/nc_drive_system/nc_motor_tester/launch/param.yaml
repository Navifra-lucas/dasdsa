  f_align_motion_range_decel_deg : 30.0  # self align angular max deceleration degree
  f_align_motion_max_rot_degs : 25.0 # self align max angular speed 
  f_align_motion_min_rot_degs : 10.0 # self align min angular speed 
  f_align_motion_min_rot_end_degs : 2.0
  f_align_motion_min_rot_deg_range : 2.0
  f_align_motion_threshold_for_start_deg : 5.0 # self align if difference is bigger than the value (only in motion 0)
  f_align_motion_threshold_for_end_deg : 3.0 # self align end if difference is smaller than than the value
  f_align_motion_threshold_for_end_fine_deg : 0.3 # self align end more fine if difference is smaller than than the value
  f_align_p_gain : 1.0
  f_align_d_gain : 0
  f_align_i_gain : 0.01
  f_align_pid_control_deg : 3

motion_arrive:
