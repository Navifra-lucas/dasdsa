# --------------------------------------------------------------------------------------------------
# roboteq_dd.yaml
# controller : FBLG2360T, SBLG2660T, SBL2360T(EOL)
# Index 0 Offset : 0x6000
# Index 1 Offset : 0x6800

# 설정 시 주의 사항
# 1. pdo mapping 시 1개의 PDO에 2개의 오브젝트만 매핑 됨 (8바이트를 전부 할당 할 수 있는 것이 아님)
# 2. cob_id 를 auto 로 하지 않음.
# 2-1. RPDO[1:3] : 0x201, 0x301, 0x401        (node id 1 의 can id)
# 2-2. TPDO[1:7] : 0x181, 0x281, 0x381, 0x481 (node id 1 의 can id)
#                + 0x182, 0x282, 0x382        (node id 2 의 can id)
# 2-3. TPDO의 cob id는 0x4xxx_xxxx 의 값으로 써야함.
#      pdo mapping을 할때, MSB를 0x80 으로 하는데, roboteq 는 0xC0로 해야함
#      (0x80 + 0x40 => 0xC0)
# 2-4. RPDO의 cob id는 TPDO처럼 해주지 않아도 됨
# --------------------------------------------------------------------------------------------------
options:
  dcf_path: "/home/navifra/navifra_solution/navicore/install/share/navican/config/generated/roboteq_dd_v80"
master:
  node_id: 100
  sync_period: 50000  # us (0.5 second)

slave_1:
  node_id: 1

  dcf: "driver/eds/roboteq/roboteq_motor_controllers_v100.eds"
  rpdo:
    1:
      enabled: true
      transmission: 1
      cob_id: 0x00000201
      mapping:
        - index: 0x6040  # Control word_ch1 <uint16>
          sub_index: 0
        - index: 0x6840  # Control word_ch2 <uint16>
          sub_index: 0

    2:
      enabled: true
      transmission: 1
      cob_id: 0x00000301
      mapping:
        - index: 0x6060  # Modes of Operation CH1 <s8>
          sub_index: 0
        - index: 0x6860  # Modes of Operation CH2 <s8>
          sub_index: 0
    3:
      enabled: true
      transmission: 1
      cob_id: 0x00000401
      mapping:
        - index: 0x60FF  # Target Velocity_ch1 <s16>
          sub_index: 0
        - index: 0x68FF  # Target Velocity_ch2 <s16>
          sub_index: 0

  tpdo:
    1:
      enabled: true
      transmission: 1
      cob_id: 0x40000181
      mapping:
        - index: 0x6041  # Status word_ch1 <uint16>
          sub_index: 0
        - index: 0x6841  # Status word_ch2 <uint16>
          sub_index: 0
    2:
      enabled: true
      transmission: 1
      cob_id: 0x40000281
      mapping:
        - index: 0x2111  # Status Flags <uint16>
          sub_index: 0
        - index: 0x2112  # Fault Flags <uint16>
          sub_index: 0
    3:
      enabled: true
      transmission: 1
      cob_id: 0x40000381
      mapping:
        - index: 0x606C  # Velocity Actual Value_ch1 <s32>
          sub_index: 0
        - index: 0x686C  # Velocity Actual value_ch2 <s32>
          sub_index: 0
    4:
      enabled: true
      transmission: 1
      cob_id: 0x40000481
      mapping:
        - index: 0x6064  # Position Actual Value CH1 <s32>
          sub_index: 0
        - index: 0x6864  # Position Actual value CH2 <s32>
          sub_index: 0   
    5:
      enabled: true
      transmission: 1
      cob_id: 0x40000182
      mapping:
        - index: 0x2100  # Motor Amps_ch1 <s16>
          sub_index: 0x01
        - index: 0x2100  # Motor Amps_ch2 <s16>
          sub_index: 0x02     
    6:
     enabled: true
     transmission: 1
     cob_id: 0x40000282
     mapping:
       - index: 0x210D  # Read Internal Voltages <u16>
         sub_index: 0x01 
    7:
     enabled: true
     transmission: 1
     cob_id: 0x40000382
     mapping:
       - index: 0x6061  # Read Internal Voltages <u16>
         sub_index: 0
       - index: 0x6861  # Read Internal Voltages <u16>
         sub_index: 0  