# Master 설정 정보
master:
  master_id: 100
  dcf_txt: "generated/swzm_qd_ll_enc/master.dcf"
  interface_name: "can0"
  fake_bootup_nodes : [1, 2, 3, 4] # node id

# 드라이버 설정 정보
drivers:
  - driver_id: 1
    eds_path: "driver/eds/schwarzmuller/EDS_20014_Standard_CANopen_V101_01.eds"
    binary_path: "generated/swzm_qd_ll_enc/slave_1.bin"
    sdo_timeout: 300 # ms

  - driver_id: 2
    eds_path: "driver/eds/schwarzmuller/EDS_20014_Standard_CANopen_V101_01.eds"
    binary_path: "generated/swzm_qd_ll_enc/slave_1.bin"
    sdo_timeout: 300 # ms

  - driver_id: 3
    eds_path: "driver/eds/schwarzmuller/EDS_20014_Standard_CANopen_V101_01.eds"
    binary_path: "generated/swzm_qd_ll_enc/slave_1.bin"
    sdo_timeout: 300 # ms   

  - driver_id: 4
    eds_path: "driver/eds/schwarzmuller/EDS_20014_Standard_CANopen_V101_01.eds"
    binary_path: "generated/swzm_qd_ll_enc/slave_1.bin"
    sdo_timeout: 300 # ms

  - driver_id: 5
    eds_path: "driver/eds/leinelinde/IxA_RxA_6xx_CANopen_v1_07.EDS"
    binary_path: "generated/swzm_qd_ll_enc/slave_5.bin"
    sdo_timeout: 300 # ms

  - driver_id: 6
    eds_path: "driver/eds/leinelinde/IxA_RxA_6xx_CANopen_v1_07.EDS"
    binary_path: "generated/swzm_qd_ll_enc/slave_6.bin"
    sdo_timeout: 300 # ms

# 모터 설정 정보
motors:
  - motor_id: 0
    driver_id: 1
    motor_driver: "swzm"
    multiaxis_index: 0
    mode_of_operation: 3
    ratio: 28
    ppr: 10000

  - motor_id: 3
    driver_id: 2
    motor_driver: "swzm"
    multiaxis_index: 0
    mode_of_operation: 3
    ratio: 28
    ppr: 10000

  - motor_id: 4
    driver_id: 3
    motor_driver: "swzm"
    multiaxis_index: 0
    mode_of_operation: 3
    ratio: 28
    ppr: 10000
    use_external_encoder: true
    encoder_id: 8

  - motor_id: 7
    driver_id: 4
    motor_driver: "swzm"
    multiaxis_index: 0
    mode_of_operation: 3
    ratio: 28
    ppr: 10000
    use_external_encoder : true
    encoder_id: 11

external_encoders:
  - encoder_id: 8
    driver_id: 5

  - encoder_id: 11
    driver_id: 6

motor_extra_info:
  - motor_id: 0
    voltage:
      index: 0x2124
      subindex: 0x00
      multiplier: 0.01
      type: "int16_t"
    current:
